<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - 在线问卷调查系统</title>
    <link href="https://cdn.jsdelivr.net/npm/element-ui@2.15.13/lib/theme-chalk/index.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
        }
        .container {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 200px;
            background-color: #304156;
            color: white;
            padding: 20px;
        }
        .sidebar h3 {
            margin-top: 0;
            color: #409eff;
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
        }
        .sidebar li {
            margin: 10px 0;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 10px;
            border-radius: 4px;
        }
        .sidebar a:hover {
            background-color: #409eff;
        }
        .main-content {
            flex: 1;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .user-info {
            display: flex;
            align-items: center;
        }
        .user-info span {
            margin-right: 10px;
        }
        .logout-button {
            background-color: #f56c6c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .logout-button:hover {
            background-color: #f78989;
        }
        .dashboard-card {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
        }
        .dashboard-card h4 {
            margin-top: 0;
            color: #303133;
        }
        .stats-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .stat-card {
            flex: 1;
            background-color: #ecf5ff;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #409eff;
        }
        .stat-label {
            color: #606266;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h3>在线问卷调查系统</h3>
            <ul>
                <li><a href="/dashboard/">仪表盘</a></li>
                <div id="role-specific-menu"></div>
                <li><a href="#" id="logout-link">退出登录</a></li>
            </ul>
        </div>
        <div class="main-content">
            <div class="header">
                <h2>仪表盘</h2>
                <div class="user-info">
                    <span id="user-name"></span>
                    <span id="user-role"></span>
                    <button class="logout-button" id="logout-button">退出登录</button>
                </div>
            </div>
            <div class="dashboard-card">
                <h4>系统概览</h4>
                <div class="stats-container">
                    <div class="stat-card">
                        <div class="stat-value" id="total-questionnaires">0</div>
                        <div class="stat-label">问卷总数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="total-responses">0</div>
                        <div class="stat-label">总填写量</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="active-questionnaires">0</div>
                        <div class="stat-label">活跃问卷</div>
                    </div>
                </div>
            </div>
            <div class="dashboard-card" id="role-specific-content"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-ui@2.15.13/lib/index.js"></script>
    <script>
        // 获取用户信息
        const userStr = localStorage.getItem('user');
        const token = localStorage.getItem('token');
        
        if (!userStr || !token) {
            window.location.href = 'login.html';
        }
        
        const user = JSON.parse(userStr);
        
        // 显示用户信息
        document.getElementById('user-name').textContent = user.username;
        document.getElementById('user-role').textContent = user.role;
        
        // 根据角色显示不同的菜单
        const roleSpecificMenu = document.getElementById('role-specific-menu');
        const roleSpecificContent = document.getElementById('role-specific-content');
        
        if (user.role === 'admin') {
            roleSpecificMenu.innerHTML = `
                <li><a href="#">用户管理</a></li>
                <li><a href="#">模板管理</a></li>
                <li><a href="#">系统监控</a></li>
                <li><a href="#">违规处理</a></li>
            `;
            roleSpecificContent.innerHTML = `
                <h4>管理员功能</h4>
                <p>作为管理员，您可以管理所有用户账号和权限，维护问卷模板库，监控系统运行状态和数据安全，处理违规问卷和恶意填写行为。</p>
            `;
        } else if (user.role === 'creator') {
            roleSpecificMenu.innerHTML = `
                <li><a href="#">问卷设计</a></li>
                <li><a href="#">发布管理</a></li>
                <li><a href="#">实时监控</a></li>
                <li><a href="#">智能设计助手</a></li>
            `;
            roleSpecificContent.innerHTML = `
                <h4>问卷创建者功能</h4>
                <p>作为问卷创建者，您可以使用拖拽式界面创建问卷，支持多种题型，设置跳转逻辑、必填项、选项互斥等，设置问卷有效期、填写次数限制、IP限制等。</p>
            `;
        } else if (user.role === 'analyst') {
            roleSpecificMenu.innerHTML = `
                <li><a href="#">数据导出</a></li>
                <li><a href="#">统计分析</a></li>
                <li><a href="#">可视化报告</a></li>
                <li><a href="#">数据筛选</a></li>
            `;
            roleSpecificContent.innerHTML = `
                <h4>数据分析员功能</h4>
                <p>作为数据分析员，您可以导出原始数据（Excel、SPSS格式），自动生成描述性统计、交叉分析等，生成图表化的分析报告，按条件筛选和过滤数据。</p>
            `;
        } else {
            roleSpecificMenu.innerHTML = `
                <li><a href="#">填写问卷</a></li>
                <li><a href="#">我的填写</a></li>
                <li><a href="#">结果查看</a></li>
            `;
            roleSpecificContent.innerHTML = `
                <h4>填写者功能</h4>
                <p>作为填写者，您可以通过链接或二维码访问问卷，保存未完成的问卷稍后继续，查看问卷完成进度，查看部分公开的统计结果。</p>
            `;
        }
        
        // 退出登录
        document.getElementById('logout-button').addEventListener('click', function() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });
        
        document.getElementById('logout-link').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login/';
        });
        
        // 模拟数据
        document.getElementById('total-questionnaires').textContent = '128';
        document.getElementById('total-responses').textContent = '3,542';
        document.getElementById('active-questionnaires').textContent = '45';
    </script>
</body>
</html>

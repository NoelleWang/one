<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 在线问卷调查系统</title>
    <link href="https://cdn.jsdelivr.net/npm/element-ui@2.15.13/lib/theme-chalk/index.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
        }
        .register-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
        }
        .register-title {
            text-align: center;
            margin-bottom: 30px;
            color: #303133;
        }
        .form-item {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #606266;
        }
        .form-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 14px;
        }
        .form-input:focus {
            outline: none;
            border-color: #409eff;
        }
        .role-select {
            width: 100%;
            padding: 10px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 14px;
        }
        .register-button {
            width: 100%;
            padding: 12px;
            background-color: #67c23a;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        .register-button:hover {
            background-color: #85ce61;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
        }
        .login-link a {
            color: #409eff;
            text-decoration: none;
        }
        .error-message {
            color: #f56c6c;
            margin-top: 10px;
            text-align: center;
        }
        .success-message {
            color: #67c23a;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2 class="register-title">注册账号</h2>
        <form id="register-form">
            <div class="form-item">
                <label class="form-label">用户名</label>
                <input type="text" class="form-input" id="username" name="username" required>
            </div>
            <div class="form-item">
                <label class="form-label">邮箱</label>
                <input type="email" class="form-input" id="email" name="email" required>
            </div>
            <div class="form-item">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" id="password" name="password" required>
            </div>
            <div class="form-item">
                <label class="form-label">角色</label>
                <select class="role-select" id="role" name="role">
                    <option value="respondent">填写者</option>
                    <option value="creator">问卷创建者</option>
                    <option value="analyst">数据分析员</option>
                </select>
            </div>
            <button type="submit" class="register-button">注册</button>
            <div class="error-message" id="error-message"></div>
            <div class="success-message" id="success-message"></div>
            <div class="login-link">
                已有账号？<a href="/login/">立即登录</a>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-ui@2.15.13/lib/index.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            
            fetch('/api/users/register/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, email, password, role })
            })
            .then(response => response.json())
            .then(data => {
                if (data.id) {
                    document.getElementById('success-message').textContent = '注册成功，请登录';
                    document.getElementById('error-message').textContent = '';
                    // 3秒后跳转到登录页面
                    setTimeout(() => {
                        window.location.href = '/login/';
                    }, 3000);
                } else {
                    document.getElementById('error-message').textContent = '注册失败，请检查信息';
                    document.getElementById('success-message').textContent = '';
                }
            })
            .catch(error => {
                document.getElementById('error-message').textContent = '注册失败，请稍后重试';
                document.getElementById('success-message').textContent = '';
                console.error('Error:', error);
            });
        });
    </script>
</body>
</html>

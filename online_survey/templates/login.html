<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 在线问卷调查系统</title>
    <link href="https://cdn.jsdelivr.net/npm/element-ui@2.15.13/lib/theme-chalk/index.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
        }
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
        }
        .login-title {
            text-align: center;
            margin-bottom: 30px;
            color: #303133;
        }
        .form-item {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #606266;
        }
        .form-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 14px;
        }
        .form-input:focus {
            outline: none;
            border-color: #409eff;
        }
        .login-button {
            width: 100%;
            padding: 12px;
            background-color: #409eff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        .login-button:hover {
            background-color: #66b1ff;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
        }
        .register-link a {
            color: #409eff;
            text-decoration: none;
        }
        .error-message {
            color: #f56c6c;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2 class="login-title">在线问卷调查系统</h2>
        <form id="login-form">
            <div class="form-item">
                <label class="form-label">邮箱</label>
                <input type="email" class="form-input" id="email" name="email" required>
            </div>
            <div class="form-item">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" id="password" name="password" required>
            </div>
            <button type="submit" class="login-button">登录</button>
            <div class="error-message" id="error-message"></div>
            <div class="register-link">
                还没有账号？<a href="/register/">立即注册</a>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-ui@2.15.13/lib/index.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            fetch('/api/users/login/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.access) {
                    localStorage.setItem('token', data.access);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    // 根据用户角色跳转到不同的页面
                    if (data.user.role === 'admin') {
                        window.location.href = '/admin/dashboard/';
                    } else if (data.user.role === 'creator') {
                        window.location.href = '/creator/dashboard/';
                    } else if (data.user.role === 'analyst') {
                        window.location.href = '/analyst/dashboard/';
                    } else {
                        window.location.href = '/respondent/dashboard/';
                    }
                } else {
                    document.getElementById('error-message').textContent = '登录失败，请检查邮箱和密码';
                }
            })
            .catch(error => {
                document.getElementById('error-message').textContent = '登录失败，请稍后重试';
                console.error('Error:', error);
            });
        });
    </script>
</body>
</html>
